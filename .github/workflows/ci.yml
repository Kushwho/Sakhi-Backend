name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
      GROQ_API_KEY: fake-ci-key
      JWT_SECRET: fake-ci-secret
      DATABASE_URL: postgresql://fake:fake@localhost:5432/fakedb
      LIVEKIT_URL: wss://fake.livekit.cloud
      LIVEKIT_API_KEY: fake-key
      LIVEKIT_API_SECRET: fake-secret
      HUME_API_KEY: fake-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt
      - run: pip install -r requirements.txt pytest-cov pytest-asyncio --upgrade
      - name: Run tests
        run: >
          pytest tests/
          --ignore=tests/test_chat.py
          -v --tb=short
          --cov=api --cov=services --cov=db
          --cov-report=term-missing
          --cov-report=html
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
